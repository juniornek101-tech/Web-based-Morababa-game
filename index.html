<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Morabaraba 3D Human vs AI</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="scene-host" id="sceneHost" aria-label="3D Morabaraba board on a park table">
      <div class="scene-message" id="sceneMessage">Loading 3D park table...</div>
    </div>

    <main class="hud" aria-label="Game interface">
      <header class="top-panel">
        <div>
          <p class="eyebrow">Human vs AI</p>
          <h1>Morabaraba 3D</h1>
        </div>
        <div class="turn-badge" id="turnBadge">New game</div>
      </header>

      <aside class="control-panel" aria-label="Game controls">
        <section class="panel-section">
          <h2>Difficulty</h2>
          <div class="segmented" role="group" aria-label="AI difficulty">
            <button class="segment-button" type="button" data-difficulty="medium">Alg2 Medium</button>
            <button class="segment-button is-active" type="button" data-difficulty="hard">Alg1 Hard</button>
          </div>
        </section>

        <section class="panel-section settings-grid">
          <label class="field">
            <span>Cows each</span>
            <select id="pieceCount">
              <option value="4">4</option>
              <option value="6">6</option>
              <option value="9">9</option>
              <option value="12" selected>12</option>
            </select>
          </label>
          <button class="primary-button" type="button" id="newGameButton">New game</button>
        </section>

        <section class="score-strip" aria-label="Score">
          <div>
            <span class="score-label">You</span>
            <strong id="humanCount">0</strong>
          </div>
          <div>
            <span class="score-label">AI</span>
            <strong id="aiCount">0</strong>
          </div>
          <div>
            <span class="score-label">Phase</span>
            <strong id="phaseLabel">Place</strong>
          </div>
        </section>

        <section class="status-panel" aria-live="polite">
          <h2>Status</h2>
          <p id="statusText">Starting game.</p>
        </section>

        <section class="log-panel">
          <h2>Move log</h2>
          <ol id="moveLog"></ol>
        </section>
      </aside>
    </main>

    <script type="module" src="js/game.mjs"></script>
  </body>
</html>
